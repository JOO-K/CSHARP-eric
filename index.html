<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spindeck — Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Roboto+Flex:opsz,wdth,wght@8..144,25..151,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=SUSE+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=4">
  <link rel="stylesheet" href="app.css?v=4">
</head>
<body>

  <!-- ==================== DESKTOP VIEWER ==================== -->
  <div id="viewer">

    <header id="toolbar">
      <div class="tb-section">
        <svg class="vinyl-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="3.5"/>
          <circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/>
          <line x1="12" y1="8.5" x2="12" y2="2" opacity="0.4"/>
        </svg>
        <span class="tb-name">C-Sharp</span>
        <span class="tb-tag">mockup</span>
      </div>

      <div class="tb-section center">
        <button class="tb-nav" id="btn-prev" title="Previous  ← ">&#8249;</button>
        <div class="tb-screen-info">
          <span id="lbl-name">Home</span>
          <span class="tb-idx" id="lbl-idx">3 / 13</span>
        </div>
        <button class="tb-nav" id="btn-next" title="Next  → ">&#8250;</button>
      </div>

      <div class="tb-section end">
        <div class="tb-zoom">
          <button class="tb-act tb-zoom-btn" id="btn-zoom-out" title="Zoom out">−</button>
          <span id="lbl-zoom" class="tb-zoom-lbl">100%</span>
          <button class="tb-act tb-zoom-btn" id="btn-zoom-in" title="Zoom in">+</button>
        </div>
        <button class="tb-act" id="btn-shuffle" title="Shuffle featured album">⟳ Shuffle</button>
        <button class="tb-act" id="btn-export" title="Export current screen as PNG">⬇ PNG</button>
        <a class="tb-act" href="flowchart.html" target="_blank">Page Map ↗</a>
      </div>
    </header>

    <main id="stage">
      <nav id="page-nav"></nav>
      <div id="phone-container"></div>
    </main>

    <nav id="thumb-tray" aria-label="Screen thumbnails"></nav>

  </div>

  <!-- ==================== MOBILE APP ==================== -->
  <div id="mobile-app">

    <header id="mobile-bar">
      <div class="mb-seg" id="mb-seg">                                
        <button class="mb-btn" data-mview="single">Single</button>
        <button class="mb-btn" data-mview="multi">Multi</button>
        <button class="mb-btn" data-mview="flow">Flow</button>
        <button class="mb-btn" data-mview="live">Live</button>
      </div>
      <button id="mb-fs" title="Fullscreen"></button>
    </header>

    <div id="mb-stage">

      <div id="mb-single" class="mb-view">
        <div class="mb-subnav">
          <button class="mb-nav-btn" id="mb-prev">&#8249;</button>
          <span id="mb-screen-name"></span>
          <button class="mb-nav-btn" id="mb-next">&#8250;</button>
        </div>
        <div id="mb-phone-center"></div>
      </div>

      <div id="mb-multi" class="mb-view">
        <div id="mb-multi-grid"></div>
      </div>

      <div id="mb-flow" class="mb-view">
        <iframe src="flowchart.html" id="mb-flow-frame" frameborder="0"></iframe>
      </div>

      <div id="mb-live" class="mb-view">
        <div id="mobile-wrap">
          <div id="mobile-content"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="data.js?v=4"></script>
  <script src="screens.js?v=4"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
